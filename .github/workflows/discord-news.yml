name: Annonce Discord des actualités

# À chaque push qui modifie data/news.json : si un NOUVEL article (non obsolète)
# est en tête du tableau, il est posté dans le salon Discord via le webhook
# stocké dans le secret DISCORD_WEBHOOK_URL (Settings → Secrets → Actions).

on:
  push:
    branches: [main, master]
    paths:
      - 'data/news.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (avec le commit parent pour comparer)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extraire la version précédente de news.json
        run: git show HEAD^:data/news.json > /tmp/news-prev.json 2>/dev/null || echo '[]' > /tmp/news-prev.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Poster le nouvel article sur Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/notify-discord.js --prev /tmp/news-prev.json
